<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Parchment map background -->
  <rect x="1" y="3" width="22" height="28" rx="2" fill="#F5E6C8" stroke="#8B7355" stroke-width="1.2"/>
  <!-- Map grid lines -->
  <line x1="4" y1="10" x2="20" y2="10" stroke="#C4A882" stroke-width="0.6"/>
  <line x1="4" y1="17" x2="20" y2="17" stroke="#C4A882" stroke-width="0.6"/>
  <line x1="4" y1="24" x2="20" y2="24" stroke="#C4A882" stroke-width="0.6"/>
  <line x1="9" y1="6" x2="9" y2="28" stroke="#C4A882" stroke-width="0.6"/>
  <line x1="15" y1="6" x2="15" y2="28" stroke="#C4A882" stroke-width="0.6"/>
  <!-- Dungeon rooms on the map -->
  <rect x="4" y="10" width="5" height="7" fill="#D4C4A8" stroke="#A08060" stroke-width="0.8"/>
  <rect x="9" y="17" width="6" height="7" fill="#D4C4A8" stroke="#A08060" stroke-width="0.8"/>
  <!-- Corridor connecting rooms -->
  <rect x="6" y="17" width="3" height="2" fill="#D4C4A8" stroke="#A08060" stroke-width="0.5"/>
  <!-- Quill pen — angled from top-right to lower-center -->
  <!-- Shaft -->
  <line x1="30" y1="1" x2="18" y2="23" stroke="#8B6914" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Feather vane (left side) -->
  <path d="M30,1 Q25,2 24,7 L26,6 Q26,3 30,1Z" fill="#E8E0D0" stroke="#8B7355" stroke-width="0.4"/>
  <path d="M28,5 Q24,7 23,11 L25.5,9.5 Q25,7 28,5Z" fill="#E0D8C8" stroke="#8B7355" stroke-width="0.3"/>
  <!-- Feather vane (right side) -->
  <path d="M30,1 Q32,4 31,7 L29,5.5 Q30,3 30,1Z" fill="#DDD5C5" stroke="#8B7355" stroke-width="0.4"/>
  <path d="M29,5 Q31,8 30,11 L28,9 Q29,7 29,5Z" fill="#D5CDC0" stroke="#8B7355" stroke-width="0.3"/>
  <!-- Barb lines -->
  <line x1="25" y1="4" x2="27" y2="3" stroke="#A09080" stroke-width="0.3"/>
  <line x1="24" y1="7" x2="26.5" y2="5.5" stroke="#A09080" stroke-width="0.3"/>
  <line x1="30.5" y1="4.5" x2="29" y2="3.5" stroke="#A09080" stroke-width="0.3"/>
  <!-- Nib -->
  <path d="M19.2,21 L18,24.5 L20.2,22Z" fill="#333" stroke="#222" stroke-width="0.3"/>
  <!-- Ink spot -->
  <circle cx="18" cy="24" r="0.7" fill="#222"/>
</svg>
