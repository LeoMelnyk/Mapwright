name: Auto Release

on:
  push:
    branches: [main]
    paths: [package.json]

permissions:
  contents: write
  actions: write

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm test

  render:
    name: Snapshot Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run test:render

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run test:e2e

  release:
    name: Create release on version bump
    needs: [lint, unit, render, e2e]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check if version is ahead of latest release
        id: version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new=$NEW_VERSION" >> "$GITHUB_OUTPUT"

          # Get latest release tag (strip leading 'v')
          LATEST_TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName // empty')
          if [ -z "$LATEST_TAG" ]; then
            echo "No existing releases found — will create first release"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            RELEASED_VERSION="${LATEST_TAG#v}"
            echo "released=$RELEASED_VERSION" >> "$GITHUB_OUTPUT"
            echo "Package version: $NEW_VERSION, Latest release: $RELEASED_VERSION"

            # Compare with semver: new must be strictly greater
            if npx --yes semver "$NEW_VERSION" --range ">$RELEASED_VERSION" > /dev/null 2>&1; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "Version $NEW_VERSION is not greater than released $RELEASED_VERSION — skipping"
              echo "changed=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Extract changelog for this version
        if: steps.version.outputs.changed == 'true'
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.new }}"
          # Extract the section for this version from CHANGELOG.md
          # Grab everything between "## vX.Y.Z" and the next "## v" or EOF
          awk "/^## v${VERSION//./\\.}/{found=1; next} /^## v/{if(found) exit} found{print}" CHANGELOG.md > release_notes.md
          # Trim leading/trailing blank lines
          sed -i '/./,$!d' release_notes.md
          sed -i -e :a -e '/^\n*$/{$d;N;ba' -e '}' release_notes.md

      - name: Create GitHub release
        if: steps.version.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.new }}"
          TAG="v${VERSION}"
          gh release create "$TAG" \
            --title "Mapwright $TAG" \
            --notes-file release_notes.md \
            --target main

      # GITHUB_TOKEN events don't trigger other workflows, so dispatch build manually
      - name: Trigger build workflow
        if: steps.version.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run build-release.yml -f tag="v${{ steps.version.outputs.new }}"
