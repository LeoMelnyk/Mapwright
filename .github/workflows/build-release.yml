name: Build Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach the exe to (e.g. v0.2.0)"
        required: true

permissions:
  contents: write # required to upload assets to the release

jobs:
  build:
    name: Build Windows (portable + installer)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build portable exe
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ELECTRON_BUILDER_PUBLISH: never
        run: npm run electron:build

      - name: Stash portable exe and clean dist
        shell: bash
        run: |
          mkdir -p dist-portable
          cp dist/*.exe dist-portable/
          rm -rf dist/

      - name: Build NSIS installer
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ELECTRON_BUILDER_PUBLISH: never
        run: npm run electron:build:installer

      - name: Upload to release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          gh release upload "$TAG" dist-portable/*.exe --clobber
          gh release upload "$TAG" dist/*.exe --clobber
          # latest.yml is needed by electron-updater for NSIS auto-updates
          if [ -f dist/latest.yml ]; then gh release upload "$TAG" dist/latest.yml --clobber; fi

  build-mac:
    name: Build Mac dmg
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Mac dmg (unsigned)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          ELECTRON_BUILDER_PUBLISH: never
        run: npm run electron:build:mac

      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name || inputs.tag }}" dist/*.dmg --clobber
