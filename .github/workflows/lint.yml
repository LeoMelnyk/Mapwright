name: Lint

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mapwright/package-lock.json

      - name: Install dependencies
        working-directory: mapwright
        run: npm ci

      - name: Run linter
        working-directory: mapwright
        run: npm run lint
